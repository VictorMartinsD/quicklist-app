<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quicklist | Sua lista de compras</title>

    <meta
      name="description"
      content="Gerencie suas compras da semana de forma simples e rápida com o Quicklist. Adicione itens, marque como concluído e tenha total controle da sua lista." />
    <meta name="author" content="Victor Martins Dias" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://victormartinsd.github.io/quicklist-app/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Sora:wght@700&display=swap"
      rel="stylesheet" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Quicklist - Gerenciador de Compras Inteligente" />
    <meta
      property="og:description"
      content="Aplicação responsiva para gerenciar itens de mercado, com interface limpa e feedbacks em tempo real." />
    <meta property="og:image" content="assets/img/preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quicklist - Gerenciador de Compras Inteligente" />
    <meta
      name="twitter:description"
      content="Aplicação responsiva para gerenciar itens de mercado, com interface limpa e feedbacks em tempo real." />
    <meta name="twitter:image" content="assets/img/preview.png" />

    <link rel="icon" href="assets/img/favicon.png?v=2" type="image/png" />
    <link rel="shortcut icon" href="assets/img/favicon.png?v=2" type="image/png" />
    <link rel="apple-touch-icon" href="assets/img/favicon.png?v=2" />

    <link rel="stylesheet" href="src/css/index.css" />
    <script type="module" src="src/js/index.js"></script>

    <script>
      function revealPage() {
        document.documentElement.classList.add("ready");
      }

      if (document.readyState === "interactive" || document.readyState === "complete") {
        revealPage();
      } else {
        document.addEventListener("DOMContentLoaded", revealPage);
      }
    </script>
  </head>
  <body>
    <header class="logo-name desktop-only">
      <svg id="logo" aria-hidden="true" focusable="false">
        <use href="assets/img/icons.svg#logo"></use>
      </svg>
      <h1 class="brand">quicklist</h1>
    </header>

    <div class="grid gap-16">
      <a href="#" class="return">&lt;- Voltar</a>
      <h2 class="title">Compras da semana</h2>
    </div>

    <main>
      <div class="new-item flex gap-16">
        <input
          id="item"
          type="text"
          placeholder="Adicione um novo item"
          aria-label="Adicione um novo item"
          maxlength="240" />
        <button class="btn-add-item">Adicionar item</button>
      </div>

      <div class="bulk-clear-slot">
        <button
          class="bulk-actions-toggle"
          type="button"
          aria-label="Mostrar ações de categoria"
          aria-expanded="false"
          aria-controls="bulk-actions-list">
          <svg class="icon" aria-hidden="true" focusable="false">
            <use href="assets/img/icons.svg#chevron-down"></use>
          </svg>
        </button>

        <div class="bulk-actions flex gap-12" id="bulk-actions-list">
          <button class="btn-new-category" type="button" aria-label="Criar nova categoria de itens.">
            Nova Categoria
          </button>
          <button class="btn-clear-all" type="button" aria-label="Apagar todos os itens da lista.">Apagar todos</button>
        </div>
      </div>

      <div class="items-scroll">
        <div class="items grid gap-12">
          <div class="item-added flex gap-12 hidden">
            <button class="drag-handle" type="button" draggable="true" aria-label="Mover item na lista.">
              <svg id="move" class="icon" aria-hidden="true" focusable="false">
                <use href="assets/img/icons.svg#move"></use>
              </svg>
            </button>
            <input type="checkbox" />
            <p class="shopping-item"></p>
            <button class="icon-button" type="button" aria-label="Apagar item.">
              <svg id="trash" class="icon" aria-hidden="true" focusable="false">
                <use href="assets/img/icons.svg#trash"></use>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>

    <div
      class="validation-modal hidden"
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="validation-modal-title"
      aria-describedby="validation-modal-description">
      <div class="validation-modal__panel">
        <div class="validation-modal__icon" aria-hidden="true">
          <svg class="icon" focusable="false">
            <use href="assets/img/icons.svg#warning"></use>
          </svg>
        </div>

        <div class="validation-modal__content">
          <h3 id="validation-modal-title">Campo obrigatório</h3>
          <p id="validation-modal-description">Digite o nome do item antes de adicionar à lista.</p>
        </div>

        <button class="icon-button validation-modal__close" type="button" aria-label="Fechar aviso">
          <svg class="icon" aria-hidden="true" focusable="false">
            <use href="assets/img/icons.svg#delete"></use>
          </svg>
        </button>
      </div>
    </div>

    <div
      class="clear-modal hidden"
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="clear-modal-title"
      aria-describedby="clear-modal-description">
      <div class="clear-modal__panel">
        <button class="icon-button clear-modal__close" type="button" aria-label="Fechar confirmação de exclusão.">
          <svg class="icon" aria-hidden="true" focusable="false">
            <use href="assets/img/icons.svg#delete"></use>
          </svg>
        </button>

        <h3 id="clear-modal-title">Apagar todos os itens</h3>
        <p id="clear-modal-description">Tem certeza que deseja apagar os itens da lista?</p>

        <div class="clear-modal__actions">
          <button class="btn-clear-cancel" type="button">Cancelar</button>
          <button class="btn-clear-confirm" type="button">Confirmar</button>
        </div>
      </div>
    </div>

    <div class="alert-footer-stack">
      <div class="alert flex gap-8 hidden">
        <svg id="warning" class="icon" aria-hidden="true" focusable="false">
          <use href="assets/img/icons.svg#warning"></use>
        </svg>
        <p class="alert-message">O item foi removido da lista</p>
        <button class="icon-button" type="button" aria-label="Fechar alerta de remoção.">
          <svg id="delete" class="icon" aria-hidden="true" focusable="false">
            <use href="assets/img/icons.svg#delete"></use>
          </svg>
        </button>
      </div>

      <footer class="site-footer">
        <p>
          Crafted with precision by
          <a href="https://github.com/VictorMartinsD" target="_blank" rel="noopener noreferrer">Victor Martins Dias</a>
          © 2026
        </p>
      </footer>
    </div>
  </body>
</html>
